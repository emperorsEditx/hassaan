<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ckeck</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: rgb(184, 184, 184);
    }

    .btn-check{
      background: rgba(255, 255, 255, .02);
      border: 1px solid black;
      border-radius: 16px;
      padding: 16px;
      position: relative;
      overflow: hidden;
      color: black;
      cursor: pointer;
    }
    .btn-check::before{
      content: '';
      position: absolute;
      width: 300%;
      height: 200%;
      background-color: red;
      left: -200%;
      top: -205%;
      z-index: -1;
      transition: all .8s ease-in-out;

    }
    .btn-check:hover::before{
      transform: rotate(-90deg) translate(0 ,95%);
    }
  </style>
</head>

<body>
  <button class="btn-preview btn-check">Hover Me</button>
</body>

</html>
